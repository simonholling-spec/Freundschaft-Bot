<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Freundschaft Betriebsassistent</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧡</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:Georgia,'Times New Roman',serif;background:#FDF5E6}
.login{height:100%;background:linear-gradient(135deg,#FDF5E6,#F5E6C8);display:flex;align-items:center;justify-content:center}
.lbox{background:#fff;border-radius:20px;padding:48px 36px;max-width:420px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.07);text-align:center}
.lbox h1{font-size:26px;color:#1B5E3B;margin:8px 0;font-weight:700}
.lbox p{font-size:15px;color:#6B7280;margin:0 0 28px;line-height:1.5}
.lbox input{width:100%;padding:14px 16px;font-size:16px;border:2px solid #F5E6C8;border-radius:12px;outline:none;font-family:inherit}
.lbox input:focus{border-color:#E8961F}
.lbox button{margin-top:14px;width:100%;padding:14px;font-size:16px;font-weight:600;color:#fff;background:#1B5E3B;border:none;border-radius:12px;cursor:pointer;font-family:inherit}
.lbox button:disabled{background:#6B7280;cursor:not-allowed}
.wrap{height:100%;display:flex;flex-direction:column}
.hdr{background:#1B5E3B;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-t{color:#fff;font-size:17px;font-weight:700}
.hdr-s{color:#F5E6C8;font-size:13px}
.abtn{background:rgba(255,255,255,.15);border:none;color:#F5E6C8;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.empty{text-align:center;color:#6B7280;margin-top:50px;font-size:15px;line-height:1.6}
.msg{display:flex}
.msg-u{justify-content:flex-end}
.msg-a{justify-content:flex-start}
.bub{max-width:82%;padding:11px 15px;font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.bub-u{background:#1B5E3B;color:#fff;border-radius:14px 14px 3px 14px}
.bub-a{background:#fff;color:#1a1a1a;border-radius:14px 14px 14px 3px}
.nf{margin-top:8px;padding:6px 10px;background:#F3F4F6;border-radius:6px;font-size:12px;color:#E8961F;font-weight:600}
.dots{display:flex;gap:5px;align-items:center;padding:12px 18px;background:#fff;border-radius:14px 14px 14px 3px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.dot{width:7px;height:7px;border-radius:50%;background:#E8961F;animation:bounce 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.15s}
.dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.ibar{padding:10px 16px 20px;background:#fff;border-top:1px solid #F5E6C8;display:flex;gap:8px;flex-shrink:0}
.ibar input{flex:1;padding:12px 14px;font-size:14px;border:2px solid #F5E6C8;border-radius:12px;outline:none;font-family:inherit;-webkit-appearance:none}
.ibar input:focus{border-color:#E8961F}
.ibar button{padding:12px 18px;font-size:14px;font-weight:700;color:#fff;background:#E8961F;border:none;border-radius:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.ibar button:disabled{background:#6B7280;cursor:not-allowed}
.admin{height:100%;background:#FDF5E6;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.admin-w{max-width:650px;margin:0 auto}
.admin-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.admin-h h1{font-size:20px;color:#1B5E3B}
.admin-h button{padding:7px 14px;background:#1B5E3B;color:#fff;border:none;border-radius:7px;cursor:pointer;font-family:inherit;font-size:13px}
.qcard{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.qcard strong{font-size:14px;color:#1a1a1a;display:block;margin-bottom:4px}
.qcard .meta{font-size:12px;color:#6B7280}
.qcard button{margin-top:6px;padding:4px 10px;font-size:12px;background:#F3F4F6;border:none;border-radius:5px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="app"></div>
<script>
const KB = `=== TAGESBEGINN ===
Vor 09:00 Uhr: Lichter an (Sicherungskasten, Stehleuchten, Keller, Lichterketten), Heizung/Klima nach Bedarf, beide Türen entsperren, Musik an (Playlist Tag). Gehweg checken, Terrasse aufbauen (Blumen, Karten, Felle, Kissen). Spülmaschinenfilter reinigen, Kaffeemaschine + Spülmaschine an, Kaffeemühle 17,5g/30Sek. Toilettencheck, Reservierungen checken + Schilder. Küche: Eintopf-Kocher an, 6x Eier (Sa/So 12x), Brot vorschneiden. Theke: Eis hochholen, Lappen vorbereiten, Krimphove abholen (nicht So).

=== TÄGLICHE ROUTINEN ===
Temperaturcheck Kühlschränke. Rundumcheck Sauberkeit. Kerzen auffüllen. Altglas/Pfand sortieren. Getränkekarten reinigen. Wachs von Tischen. Zuckergläser/Salz/Pfeffer auffüllen. Krimphove-Kisten zurück. Eintopf-Schild aufstellen. Bestandskontrolle Backwaren.

=== SCHICHTENDE FRÜH (ab 16:00) ===
Lebensmittel/Obst vorschneiden. Auffüllen: Theke aus Kühlhaus, Rückbuffet aus Keller, Kaffee+Reserve, Hafermilch+Reserve, Eisschale. Müll bei Bedarf. Küche+Theke sauber. Pfand/Altglas leeren. Eis in Thermobox.
Fr+Sa extra: Reserve-Obst, WE-Mengen (3x Secco, 2x Helles, 2x Estrella), Espresso Martini Mix (3,5 Flaschen), Lüftung OG+UG an, UG-Tür zu.

=== SCHLUSSDIENST ===
Schichtleitung: Kasse auszählen, Tagesbericht, Trinkgeld berechnen+verteilen, Umsatz in Tresor, MA ausstempeln, Kasse/Handhelds/EC aus+laden. EC UG Reset Fr+Sa.
Küche: Eintöpfe umfüllen (Entsorgung nur Mi+Sa), Suppenkocher reinigen, Lebensmittel einräumen, Brötchen entsorgen/verschenken, Eierkocher reinigen, GN-Behälter tauschen, Flächen desinfizieren, Siebträger reinigen+einhängen, Mocca-Master reinigen, Spüle auswischen, Spülmaschine abpumpen+reinigen.
Service: Terrasse zu (22h), Tische abräumen+reinigen, Wachs abkratzen, Gastraum sortieren, Theke+Servicepass reinigen, Aufstuhlen (Di/Fr/Sa), Pfand/Altglas/Fässer ins Lager, Servietten/Strohhalme/Bierdeckel, Kuchengabeln/Becher/Tablets spülen, Aschenbecher reinigen, Kundenstopper rein, Markise ein, WC-Tür Innenhof zu.
Theke: Kühlschubladen auffüllen (hinten>vorne), Rückbuffet auffüllen, Kühlhaus auffüllen, Theke/Metallgestelle/Gummimatten/Zapfanlage reinigen, Eiswürfelbehälter/Barwerkzeug reinigen, Schnapsaufgießer wechseln, Spüle auswischen, Kühlschubladen außen (Glasreiniger), Rückbuffet Oberflächen, Displays reinigen, Musikhandy laden, Wasserkaraffe leeren, Servietten auffüllen.
Abschließen: Wäsche (60 Grad) Mo/Do/Sa, Lichter aus, Bewegungsmelder an, Lüftung aus (Fr/Sa: auf Lüftung umstellen), Check Ausstempeln, Türen abschließen.

=== BARBUCH ===
Heißgetränke (alle mit Schokobon): Filterkaffee = große Tasse. Americano = mittlere Tasse+Untertasse. Espresso/Macchiato = kleine Tasse+Untertasse. Espresso Doppio = mittlere Tasse. Cappuccino = mittlere Tasse. Milchkaffee = große Tasse. Latte Macchiato = Nachtmann hoch. Flat White = Nachtmann kurz. Iced Latte = Nachtmann hoch. Heiße Schokolade = Glastasse. Tee = Glastasse rot.
AFG (mit Flasche, Gast schenkt selbst, Ausnahme Mate+Saftschorle): AFG Glas 3 Eiswürfel ohne Garnierung: Wasser, Saft/Schorle, Almdudler, Mate. Mit Zitrone: Cola/Zero, Sprite, Bitter Lemon, Tonic. Mit Orange: Fanta, Mezzo Mix, Ginger Ale.
Limonaden: Grapefruit: 2cl Grapefruit Mix, 1cl Limettensaft, Soda, 3 Eiswürfel, Scheibe Limette. Limette-Minz: 2cl Minz Mix, 1cl Limettensaft, Soda, 3 Eiswürfel, Scheibe Limette, Strauch Minze.
Weine: Weißwein (Weißweinglas): Gut Edel, Tagtraum, Chardonnay, Blanc De Noir, Rosalinde. Sekt (Sektglas): Münstersekt, Cremant. Rotwein (Rotweinglas): Cabernet Syrah, Tre Passo. Immer etwas mehr als Füllstrich!
Aperol Spritz: Aperol Kelchglas, 4cl Aperol, 10cl Secco, 4 Eiswürfel, Soda, Scheibe Orange.
Lillet Wild Berry: Lillet Kelchglas, 5cl Lillet Blanc, 10cl Wild Berry, Beeren Mix, Eiswürfel auffüllen.
Sarti Spritz: Sarti Kelchglas, 4cl Sarti, 10cl Secco, Eiswürfel, Soda, Scheibe Limette.
Limoncello Spritz: Weißweinglas 0,2, 4cl Limoncello, 10cl Secco, Eiswürfel, Soda, Scheibe Zitrone, Strauch Minze.
Spritzer: Weißweinglas 0,2, Weinschorle, Scheibe Zitrone, 3 Eiswürfel.
Crodino: Weißweinglas 0,2, Crodino, 3 Eiswürfel, Scheibe Orange.
Golden Ferrari: AFG Glas, 20cl Secco, 10cl Mate, 3 Eiswürfel.
Secco Maracuja: AFG Glas, 20cl Secco, 10cl Maracuja, 3 Eiswürfel.
Espresso Martini: Shaker, 4-5 Eiswürfel, 3cl Vodka, 3cl Kahlua, 3cl Espresso, 15-20s schütteln, Martini Glas durch Sieb, 3 Bohnen garnieren. Mix-Sollbestand Fr/Sa: 3,5 Flaschen.
Longdrinks (alle Nachtmann Glas Groß): Gin Tonic: 4cl Gin (Monkey47/Malfi/Beefeater), 4-5 Eiswürfel, Scheibe Zitrone, Thomas Henry Tonic dazu. Vodka Soda: 4-5 Eis, 4cl Vodka, 1cl Limetten-/Zitronensaft, Soda, Scheibe Zitrone/Limette. Vodka Lemon: 4-5 Eis, 4cl Vodka, Scheibe Zitrone, Thomas Henry Lemon dazu. Vodka Mate: 4-5 Eis, 4cl Vodka, Mate auffüllen. Cuba Libre: 1/4 Limette stampfen, 4-5 Eis, 4cl Havanna Club 3, Scheibe Limette, Cola. Santo Libre: 4-5 Eis, 4cl Havanna Club 7, Scheibe Zitrone, Sprite dazu.
Schnaps: Shotglas: Berliner Luft, Frangelico, Jägermeister, Tequila, Vodka, Sambuca. Flat White Glas (3 Eiswürfel): Limoncello, Ramazotti, Havana Club, Ballantine's, Sasse Lagerkorn, Pistazienlikör. Limoncello+Ramazotti mit Scheibe Zitrone.

=== LIEFERUNGEN & ABHOLUNGEN ===
Mo: Abholung Krimphove. Di: Lieferung Getränke Richard + Handelshof, Abholung Krimphove. Mi: Abholung Krimphove + Marktware (bis 13h) + Fischbrathalle (ab 11h) + Feinkost Nassim. Do: Lieferung Bannert und Scherer (Wein), Abholung Krimphove. Fr: Lieferung Getränke Richard, Abholung Krimphove. Sa: Lieferung Handelshof + Fischbrathalle + Feinkost Nassim, Abholung Krimphove + Marktware (bis 13h). So: Nichts (kein Brot).

=== TECHNIK ===
Kaffeemaschine: morgens an, abends Siebträger reinigen+einhängen. Mühle: 17,5g/30s. Spülmaschine: Filter vor Anstellen reinigen, abends abpumpen+reinigen. Mocca-Master: abends reinigen. Eierkocher: morgens 6x (Sa/So 12x), abends reinigen. Suppenkocher: morgens befüllen, abends reinigen. EC-Geräte: abends laden, UG Reset Fr+Sa. Handhelds: abends laden. Sound EG: Soundcraft+Sonos. Sound UG: Yamaha DM3+PA.

=== PERSONAL-LEITFADEN ===
Werte: Leidenschaft, Zusammenarbeit, Innovation, Energie, Authentizität. Respekt unabhängig von Position. Offene Kommunikation.
Arbeitszeit: 5 Min vor Schichtbeginn. Stempeln bei Beginn+Ende. Pausen absprechen. Dienstplan am 25., Verfügbarkeiten bis 20. Min 2 Schichten/Woche, 1x WE. Schichttausch: selbst Ersatz+Bestätigung. Krankheit: sofort per Nachricht.
Kleidung: Feste Schuhe, keine Flip-Flops/Birkenstocks, keine politischen Shirts.
Trinkgeld: gleichmäßig auf alle Anwesenden. Lohn am 15. Folgemonat.
Personalrabatt: 50% Speisen (Arbeitstage), 50% Getränke (immer), 1 Feierabendgetränk gratis. Alles buchen!
Regeln: Keine Drogen. Kein Alkohol bei Arbeit (SL-Ausnahme ab 23h möglich). Nicht über Gäste lästern. Freigetränke mit SL absprechen. Bei Übergriffen sofort melden. Wohnungslose/Postboten/Lieferanten: immer Getränk anbieten, auf Einladung buchen.

=== SERVICE-REGELN ===
Gläser bei Neuservierung austauschen (voll gegen leer). Getränke erst abräumen wenn Gäste weg. KEIN Abräumen leerer Gläser solange Gast noch sitzt.

=== REINIGUNG ===
Täglich: Toiletten, Spülmaschinenfilter, Terrasse, Gastraum, Theke+Servicepass. Mo: Blumen gießen, Pflanzenpflege, Kühlschubladen Theke, Staubwischen Rückbuffet+Galerie, Urinalsiebe. Fr: Spielekiste, Staubwischen. Wäsche: Mo/Do/Sa 60 Grad.

=== TERRASSE ===
Morgens: Grundreinigung, aufbauen (Blumen, Karten, Felle, Kissen). Abends: zu um 22h, Tische abräumen, Stühle aufstuhlen+abschließen, Kundenstopper+Aschenbecher rein, Markise ein.

=== KASSE ===
Schichtleitung täglich: Kasse auszählen, Tagesumsatz separieren, Tagesbericht ziehen, Trinkgeld berechnen+sortieren+verteilen, Umsatz im Umschlag in Tresor, MA ausstempeln, Kasse+Handhelds aus+laden, EC aus+laden, EC UG Reset Fr+Sa.`;

const SYS = "Du bist der Freundschaft Betriebsassistent für das Café/Bar Freundschaft in Münster. Antworte freundlich-professionell in du-Form, kurz und praktisch. Gib NIEMALS an woher die Info kommt. Keine Quellenverweise. Antworte nur wenn die Info klar vorliegt. Bei Unsicherheit: 'Das kann ich dir leider nicht beantworten. Bitte wende dich an die Betriebsleitung.' + am Ende [NICHT_GEFUNDEN]. GESPERRT (verweigern ohne [NICHT_GEFUNDEN]): Gehälter, Finanzzahlen, Strategiedokumente, Monatsstunden/Beschäftigungsart/Kontaktdaten einzelner MA, Dienstplan, Bewerberdaten, Feedbackgespräche. Antworte auf Deutsch.\n\nWISSEN:\n" + KB;

let state = { view: "login", name: "", msgs: [], loading: false, openQ: [] };
try { const s = localStorage.getItem("fbot_oq"); if (s) state.openQ = JSON.parse(s); } catch(e) {}
function saveOQ() { try { localStorage.setItem("fbot_oq", JSON.stringify(state.openQ)); } catch(e) {} }

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>"); }

function render() {
  const app = document.getElementById("app");
  if (state.view === "admin") return renderAdmin(app);
  if (state.view === "login") return renderLogin(app);
  renderChat(app);
}

function renderLogin(el) {
  el.innerHTML = '<div class="login"><div class="lbox">' +
    '<div style="font-size:48px;margin-bottom:8px">🧡</div>' +
    '<h1>Freundschaft</h1>' +
    '<p>Betriebsassistent — stelle deine Fragen<br>zu Abläufen, Rezepten und Prozessen.</p>' +
    '<input type="text" placeholder="Dein Name" id="nameIn">' +
    '<button id="startBtn" disabled>Los geht\'s</button>' +
    '</div></div>';
  var inp = document.getElementById("nameIn");
  var btn = document.getElementById("startBtn");
  inp.addEventListener("input", function() { btn.disabled = !inp.value.trim(); });
  inp.addEventListener("keydown", function(e) { if (e.key === "Enter" && inp.value.trim()) { state.name = inp.value.trim(); state.view = "chat"; render(); } });
  btn.addEventListener("click", function() { if (inp.value.trim()) { state.name = inp.value.trim(); state.view = "chat"; render(); } });
  setTimeout(function() { inp.focus(); }, 100);
}

function renderChat(el) {
  var msgsHtml = "";
  if (!state.msgs.length) {
    msgsHtml = '<div class="empty"><div style="font-size:36px;margin-bottom:10px">💬</div>Stelle eine Frage —<br>"Wie mache ich einen Aperol Spritz?"<br>"Was muss ich beim Schließen beachten?"</div>';
  }
  for (var i = 0; i < state.msgs.length; i++) {
    var m = state.msgs[i];
    var cls = m.r === "u" ? "msg msg-u" : "msg msg-a";
    var bcls = m.r === "u" ? "bub bub-u" : "bub bub-a";
    var extra = "";
    if (m.nf) extra = '<div class="nf">📝 Frage an die Betriebsleitung weitergeleitet.</div>';
    msgsHtml += '<div class="' + cls + '"><div class="' + bcls + '">' + esc(m.text) + extra + '</div></div>';
  }
  if (state.loading) {
    msgsHtml += '<div class="msg msg-a"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  }
  msgsHtml += '<div id="end"></div>';

  el.innerHTML = '<div class="wrap">' +
    '<div class="hdr"><div class="hdr-l"><span style="font-size:26px">🧡</span><div><div class="hdr-t">Freundschaft</div><div class="hdr-s">Hallo ' + esc(state.name) + '</div></div></div>' +
    '<button class="abtn" id="adminBtn">📋 ' + state.openQ.length + '</button></div>' +
    '<div class="msgs" id="msgsBox">' + msgsHtml + '</div>' +
    '<div class="ibar"><input type="text" placeholder="Stelle deine Frage..." id="qIn"><button id="sendBtn">Fragen</button></div>' +
    '</div>';

  document.getElementById("adminBtn").addEventListener("click", function() { state.view = "admin"; render(); });
  var qi = document.getElementById("qIn");
  var sb = document.getElementById("sendBtn");
  qi.addEventListener("keydown", function(e) { if (e.key === "Enter") doSend(); });
  sb.addEventListener("click", doSend);
  if (state.loading) { sb.disabled = true; qi.disabled = true; }
  var endEl = document.getElementById("end");
  if (endEl) endEl.scrollIntoView({ behavior: "smooth" });
  if (!state.loading) setTimeout(function() { qi.focus(); }, 100);
}

async function doSend() {
  var qi = document.getElementById("qIn");
  var q = qi.value.trim();
  if (!q || state.loading) return;
  state.msgs.push({ r: "u", text: q });
  state.loading = true;
  render();

  try {
    var res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 800,
        system: SYS,
        messages: state.msgs.filter(function(m) { return !m.nf || m.r === "u"; }).slice(-8).map(function(m) {
          return { role: m.r === "u" ? "user" : "assistant", content: m.text };
        })
      })
    });
    var data = await res.json();
    var ans = (data.content && data.content[0] && data.content[0].text) || "Fehler. Bitte frag die Betriebsleitung.";
    var nf = ans.indexOf("[NICHT_GEFUNDEN]") !== -1;
    ans = ans.replace("[NICHT_GEFUNDEN]", "").trim();
    state.msgs.push({ r: "a", text: ans, nf: nf });
    if (nf) {
      state.openQ.push({ q: q, by: state.name, d: new Date().toISOString() });
      saveOQ();
    }
  } catch(e) {
    state.msgs.push({ r: "a", text: "Technischer Fehler. Bitte frag die Betriebsleitung direkt." });
  }
  state.loading = false;
  render();
}

function renderAdmin(el) {
  var cards = "";
  if (!state.openQ.length) {
    cards = '<p style="color:#6B7280;text-align:center;margin-top:30px">Keine offenen Fragen.</p>';
  } else {
    for (var i = 0; i < state.openQ.length; i++) {
      var q = state.openQ[i];
      var d = new Date(q.d);
      cards += '<div class="qcard"><strong>' + esc(q.q) + '</strong><div class="meta">Von: ' + esc(q.by) + ' — ' +
        d.toLocaleDateString("de-DE") + ' ' + d.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }) +
        '</div><button data-i="' + i + '">Erledigt</button></div>';
    }
  }
  el.innerHTML = '<div class="admin"><div class="admin-w">' +
    '<div class="admin-h"><h1>Offene Fragen (' + state.openQ.length + ')</h1><button id="backBtn">Zurück</button></div>' +
    cards + '</div></div>';
  document.getElementById("backBtn").addEventListener("click", function() { state.view = "chat"; render(); });
  var btns = el.querySelectorAll(".qcard button");
  for (var j = 0; j < btns.length; j++) {
    btns[j].addEventListener("click", function() {
      state.openQ.splice(parseInt(this.dataset.i), 1);
      saveOQ();
      render();
    });
  }
}

render();
</script>
</body>
</html>
