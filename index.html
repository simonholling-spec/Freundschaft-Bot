async function syncToNotion(question, askedBy, type) {
  var nkey = gnk();
  if (!nkey) return false;
  try {
    var res = await fetch("https://api.notion.com/v1/pages", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + nkey,
        "Notion-Version": "2022-06-28",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        parent: { database_id: NOTION_DB_ID },
        properties: {
          "Frage": { title: [{ text: { content: question } }] },
          "Status": { select: { name: "Offen" } },
          "Gestellt von": { rich_text: [{ text: { content: askedBy } }] },
          "Bereich": { select: { name: "Sonstiges" } }
        }
      })
    });
    var d = await res.json();
    return !d.object || d.object !== "error";
  } catch(e) {
    return false;
  }
}

function rSetup(el){
  var hasKeys = gk() && gnk();
  el.innerHTML='<div class="screen"><div class="box"><div style="font-size:40px;margin-bottom:8px">&#9881;</div><h1>Einrichtung</h1><p>API-Keys eingeben. Werden nur lokal auf diesem Geraet gespeichert.</p><div id="serr"></div>'

    +'<button id="keyBtn">Speichern und starten</button>'
    +'<div class="hint">Claude Key: console.anthropic.com<br>Notion Token: notion.so/my-integrations<br>Beide Keys werden nicht weitergegeben.</div>'
    +(hasKeys?'<div class="link" id="skipLnk">Ohne Aenderung weiter</div>':'')
    +'</div></div>';
  var ki=document.getElementById("keyIn"),nki=document.getElementById("nkeyIn"),kb=document.getElementById("keyBtn");

  if(sl)sl.addEventListener("click",function(){ST.v="login";render()});

  ki.addEventListener("keydown",function(e){if(e.key==="Enter")nki.focus()});
  nki.addEventListener("keydown",function(e){if(e.key==="Enter")doKey()});
  kb.addEventListener("click",doKey);
  function doKey(){
    var cv=ki.value.trim(),nv=nki.value.trim();
    if(cv==="********")cv=gk();
    if(nv==="********")nv=gnk();
    if(!cv||cv.length<10){document.getElementById("serr").innerHTML='<div class="err">Bitte einen gueltigen Claude API-Key eingeben</div>';return}
    if(!nv||nv.length<10){document.getElementById("serr").innerHTML='<div class="err">Bitte einen gueltigen Notion Token eingeben</div>';return}
    sk(cv);snk(nv);
    document.getElementById("serr").innerHTML='<div class="ok">Gespeichert!</div>';
    setTimeout(function(){ST.v="login";render()},500);
  }
  setTimeout(function(){if(!gk())ki.focus();else nki.focus()},100);
}

function rLogin(el){
  el.innerHTML='<div class="screen"><div class="box"><div style="font-size:48px;margin-bottom:8px">&#129505;</div><h1>Freundschaft</h1><p>Betriebsassistent<br>Stelle deine Fragen zu Ablaeufen, Rezepten und Prozessen.</p><input type="text" placeholder="Dein Name" id="nameIn"><button id="goBtn" disabled>Los gehts</button><div class="link" id="cfgLnk">Einstellungen</div></div></div>';
  var ni=document.getElementById("nameIn"),gb=document.getElementById("goBtn");
  ni.addEventListener("input",function(){gb.disabled=!ni.value.trim()});
  ni.addEventListener("keydown",function(e){if(e.key==="Enter"&&ni.value.trim()){ST.n=ni.value.trim();ST.v="chat";ST.ms=[];ST.firstQ=true;ansCount=0;render()}});
  gb.addEventListener("click",function(){if(ni.value.trim()){ST.n=ni.value.trim();ST.v="chat";ST.ms=[];ST.firstQ=true;ansCount=0;render()}});
  document.getElementById("cfgLnk").addEventListener("click",function(){ST.v="setup";render()});
  setTimeout(function(){ni.focus()},100);
}

    if(m.nf)ex='<div class="nf">&#128221; Frage an Betriebsleitung weitergeleitet.</div>';
    if(m.uc)ex='<div class="uc">&#9888;&#65039; Antwort unsicher - Frage zusaetzlich an Betriebsleitung weitergeleitet.</div>';
    if(m.ns)ex+='<div class="nsync">&#9989; In Notion gespeichert</div>';
    if(m.nfl)ex+='<div class="nfail">Notion-Sync fehlgeschlagen - lokal gespeichert</div>';
    if(m.gr)ex+='<div class="greeting">'+esc(m.gr)+'</div>';
    mh+='<div class="'+c+'"><div class="'+b+'">'+esc(m.t)+ex+'</div></div>';
  }
  if(ST.ld)mh+='<div class="msg msg-a"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';

  el.innerHTML='<div class="wrap"><div class="hdr"><div class="hdr-l"><span style="font-size:26px">&#129505;</span><div><div class="hdr-t">Freundschaft</div><div class="hdr-s">Hallo '+esc(ST.n)+'</div></div></div><button class="abtn" id="aBtn">&#128203; '+ST.oq.length+'</button></div><div class="msgs" id="mBox"><div class="msgs-inner">'+mh+'</div></div><div class="ibar"><input type="text" placeholder="Stelle deine Frage..." id="qIn"><button id="sBtn">Fragen</button></div></div>';

  document.getElementById("aBtn").addEventListener("click",function(){ST.v="admin";render()});
  var qi=document.getElementById("qIn"),sb=document.getElementById("sBtn");
  qi.addEventListener("keydown",function(e){if(e.key==="Enter")doQ()});
  sb.addEventListener("click",doQ);
  if(ST.ld){sb.disabled=true;qi.disabled=true}
  var box=document.getElementById("mBox");
  if(box)setTimeout(function(){box.scrollTop=box.scrollHeight},50);
  if(!ST.ld)setTimeout(function(){qi.focus()},150);
}

async function doQ(){
  var qi=document.getElementById("qIn"),q=qi.value.trim();
  if(!q||ST.ld)return;
  ST.ms.push({r:"u",t:q});
  ST.ld=true;
  render();
  try{
    var key=gk();
    if(!key){ST.ms.push({r:"a",t:"Kein API-Key hinterlegt. Bitte unter Einstellungen den Key eingeben."});ST.ld=false;render();return}
    var userMsg=q;
    if(ST.firstQ){userMsg="[Begruesse den Nutzer kurz mit dem Namen "+ST.n+", z.B. Hey "+ST.n+"! oder Moin "+ST.n+"! und beantworte dann die Frage.]\n\n"+q;ST.firstQ=false}
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:SYS_PROMPT,messages:[{role:"user",content:userMsg}]})
    });
    var d=await res.json();
    if(d.error){ST.ms.push({r:"a",t:"API-Fehler: "+(d.error.message||"Unbekannt")})}
    else{
      var ans=(d.content&&d.content[0]&&d.content[0].text)||"Fehler. Bitte frag die Betriebsleitung.";
      var nf=ans.indexOf("[NICHT_GEFUNDEN]")!==-1;
      var uc=ans.indexOf("[UNSICHER]")!==-1;
      ans=ans.replace(/\[NICHT_GEFUNDEN\]/g,"").replace(/\[UNSICHER\]/g,"").trim();
      var gr=maybeGreeting();
      var msgObj={r:"a",t:ans,nf:nf,uc:uc,gr:gr||null};
      ST.ms.push(msgObj);
      if(nf||uc){
        ST.oq.push({q:q,by:ST.n,d:new Date().toISOString(),type:nf?"offen":"unsicher"});
        soq();
        ST.ld=false;
        render();
        var synced=await syncToNotion(q,ST.n,nf?"offen":"unsicher");
        msgObj.ns=synced;
        msgObj.nfl=!synced;
        render();
        return;
      }
    }
  }catch(e){ST.ms.push({r:"a",t:"Verbindungsfehler: "+e.message})}
  ST.ld=false;
  render();
}

function rAdmin(el){
  var c="";
  if(!ST.oq.length)c='<p style="color:#6B7280;text-align:center;margin-top:30px">Keine offenen Fragen.</p>';
  else for(var i=0;i<ST.oq.length;i++){
    var q=ST.oq[i],d=new Date(q.d);
    var badge=q.type==="unsicher"?'<span style="background:#FEF3C7;color:#92400E;padding:2px 6px;border-radius:4px;font-size:11px;margin-left:6px">unsicher</span>':'<span style="background:#FEE2E2;color:#DC2626;padding:2px 6px;border-radius:4px;font-size:11px;margin-left:6px">offen</span>';
    c+='<div class="qcard"><strong>'+esc(q.q)+badge+'</strong><div class="meta">Von: '+esc(q.by)+' - '+d.toLocaleDateString("de-DE")+'</div><button data-i="'+i+'">Erledigt</button></div>';
  }
  el.innerHTML='<div class="admin"><div class="admin-w"><div class="admin-h"><h1>Offene Fragen ('+ST.oq.length+')</h1><button id="bkBtn">Zurueck</button></div>'+c+'</div></div>';
  document.getElementById("bkBtn").addEventListener("click",function(){ST.v="chat";render()});
  var bs=el.querySelectorAll(".qcard button");
  for(var j=0;j<bs.length;j++)bs[j].addEventListener("click",function(){ST.oq.splice(parseInt(this.dataset.i),1);soq();render()});
}

init();
</script>
</body>
