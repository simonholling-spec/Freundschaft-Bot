<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Freundschaft Betriebsassistent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:Georgia,'Times New Roman',serif;background:#FDF5E6}
.screen{height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FDF5E6,#F5E6C8)}
.box{background:#fff;border-radius:20px;padding:44px 36px;max-width:420px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.07);text-align:center}
.box h1{font-size:24px;color:#1B5E3B;margin:8px 0;font-weight:700}
.box p{font-size:14px;color:#6B7280;margin:0 0 24px;line-height:1.5}
.box input{width:100%;padding:13px 15px;font-size:15px;border:2px solid #F5E6C8;border-radius:11px;outline:none;font-family:inherit;margin-bottom:10px}
.box input:focus{border-color:#E8961F}
.box button{width:100%;padding:13px;font-size:15px;font-weight:600;color:#fff;background:#1B5E3B;border:none;border-radius:11px;cursor:pointer;font-family:inherit}
.box button:disabled{background:#6B7280;cursor:not-allowed}
.box .link{font-size:12px;color:#9CA3AF;margin-top:14px;cursor:pointer;text-decoration:underline}
.box .err{color:#DC2626;font-size:13px;margin-bottom:8px}
.box .hint{font-size:12px;color:#9CA3AF;margin-top:10px;line-height:1.4}
.wrap{height:100%;display:flex;flex-direction:column}
.hdr{background:#1B5E3B;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-t{color:#fff;font-size:17px;font-weight:700}
.hdr-s{color:#F5E6C8;font-size:13px}
.abtn{background:rgba(255,255,255,.15);border:none;color:#F5E6C8;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.empty{text-align:center;color:#6B7280;margin-top:50px;font-size:15px;line-height:1.6}
.msg{display:flex}.msg-u{justify-content:flex-end}.msg-a{justify-content:flex-start}
.bub{max-width:82%;padding:11px 15px;font-size:14px;line-height:1.55;white-space:pre-wrap;word-break:break-word;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.bub-u{background:#1B5E3B;color:#fff;border-radius:14px 14px 3px 14px}
.bub-a{background:#fff;color:#1a1a1a;border-radius:14px 14px 14px 3px}
.nf{margin-top:8px;padding:6px 10px;background:#F3F4F6;border-radius:6px;font-size:12px;color:#E8961F;font-weight:600}
.dots{display:flex;gap:5px;align-items:center;padding:12px 18px;background:#fff;border-radius:14px 14px 14px 3px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.dot{width:7px;height:7px;border-radius:50%;background:#E8961F;animation:bn 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes bn{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.ibar{padding:10px 16px 20px;background:#fff;border-top:1px solid #F5E6C8;display:flex;gap:8px;flex-shrink:0}
.ibar input{flex:1;padding:12px 14px;font-size:14px;border:2px solid #F5E6C8;border-radius:12px;outline:none;font-family:inherit}
.ibar input:focus{border-color:#E8961F}
.ibar button{padding:12px 18px;font-size:14px;font-weight:700;color:#fff;background:#E8961F;border:none;border-radius:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.ibar button:disabled{background:#6B7280;cursor:not-allowed}
.admin{height:100%;background:#FDF5E6;overflow-y:auto;padding:20px}
.admin-w{max-width:650px;margin:0 auto}
.admin-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.admin-h h1{font-size:20px;color:#1B5E3B}
.admin-h button{padding:7px 14px;background:#1B5E3B;color:#fff;border:none;border-radius:7px;cursor:pointer;font-family:inherit;font-size:13px}
.qcard{background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.qcard strong{font-size:14px;display:block;margin-bottom:4px}
.qcard .meta{font-size:12px;color:#6B7280}
.qcard button{margin-top:6px;padding:4px 10px;font-size:12px;background:#F3F4F6;border:none;border-radius:5px;cursor:pointer}
</style>
</head>
<body>
<div id="app">Laden...</div>
<script>
var KB_DATA = [
"=== TAGESBEGINN ===",
"Vor 09:00 Uhr: Lichter an (Sicherungskasten, Stehleuchten, Keller, Lichterketten), Heizung/Klima nach Bedarf, beide Tueren entsperren, Musik an (Playlist Tag). Gehweg checken, Terrasse aufbauen (Blumen, Karten, Felle, Kissen). Spuelmaschinenfilter reinigen, Kaffeemaschine + Spuelmaschine an, Kaffeemuehle 17,5g/30Sek. Toilettencheck, Reservierungen checken + Schilder. Kueche: Eintopf-Kocher an, 6x Eier (Sa/So 12x), Brot vorschneiden. Theke: Eis hochholen, Lappen vorbereiten, Krimphove abholen (nicht So).",
"",
"=== TAEGLICHE ROUTINEN ===",
"Temperaturcheck Kuehlschraenke. Rundumcheck Sauberkeit. Kerzen auffuellen. Altglas/Pfand sortieren. Getraenkekarten reinigen. Wachs von Tischen. Zuckerglaeser/Salz/Pfeffer auffuellen. Krimphove-Kisten zurueck. Eintopf-Schild aufstellen. Bestandskontrolle Backwaren.",
"",
"=== SCHICHTENDE FRUEH (ab 16:00) ===",
"Lebensmittel/Obst vorschneiden. Auffuellen: Theke aus Kuehlhaus, Rueckbuffet aus Keller, Kaffee+Reserve, Hafermilch+Reserve, Eisschale. Muell bei Bedarf. Kueche+Theke sauber. Pfand/Altglas leeren. Eis in Thermobox. Fr+Sa extra: Reserve-Obst, WE-Mengen (3x Secco, 2x Helles, 2x Estrella), Espresso Martini Mix (3,5 Flaschen), Lueftung OG+UG an, UG-Tuer zu.",
"",
"=== SCHLUSSDIENST ===",
"Schichtleitung: Kasse auszaehlen, Tagesbericht, Trinkgeld berechnen+verteilen, Umsatz in Tresor, MA ausstempeln, Kasse/Handhelds/EC aus+laden. EC UG Reset Fr+Sa.",
"Kueche: Eintoepfe umfuellen (Entsorgung nur Mi+Sa), Suppenkocher reinigen, Lebensmittel einraeumen, Broetchen entsorgen/verschenken, Eierkocher reinigen, GN-Behaelter tauschen, Flaechen desinfizieren, Siebtraeger reinigen+einhaengen, Mocca-Master reinigen, Spuele auswischen, Spuelmaschine abpumpen+reinigen.",
"Service: Terrasse zu (22h), Tische abraeumen+reinigen, Wachs abkratzen, Gastraum sortieren, Theke+Servicepass reinigen, Aufstuhlen (Di/Fr/Sa), Pfand/Altglas/Faesser ins Lager, Servietten/Strohhalme/Bierdeckel, Kuchengabeln/Becher/Tablets spuelen, Aschenbecher reinigen, Kundenstopper rein, Markise ein, WC-Tuer Innenhof zu.",
"Theke: Kuehlschubladen auffuellen (hinten nach vorne), Rueckbuffet auffuellen, Kuehlhaus auffuellen, Theke/Metallgestelle/Gummimatten/Zapfanlage reinigen, Eiswuerfelbehaelter/Barwerkzeug reinigen, Schnapsaufgiesser wechseln, Spuele auswischen, Kuehlschubladen aussen (Glasreiniger), Rueckbuffet Oberflaechen, Displays reinigen, Musikhandy laden, Wasserkaraffe leeren, Servietten auffuellen.",
"Abschliessen: Waesche (60 Grad) Mo/Do/Sa, Lichter aus, Bewegungsmelder an, Lueftung aus (Fr/Sa: auf Lueftung umstellen), Check Ausstempeln, Tueren abschliessen.",
"",
"=== BARBUCH ===",
"Heissgetraenke (alle mit Schokobon): Filterkaffee = grosse Tasse. Americano = mittlere Tasse+Untertasse. Espresso/Macchiato = kleine Tasse+Untertasse. Espresso Doppio = mittlere Tasse. Cappuccino = mittlere Tasse. Milchkaffee = grosse Tasse. Latte Macchiato = Nachtmann hoch. Flat White = Nachtmann kurz. Iced Latte = Nachtmann hoch. Heisse Schokolade = Glastasse. Tee = Glastasse rot.",
"AFG (mit Flasche, Gast schenkt selbst, Ausnahme Mate+Saftschorle): AFG Glas 3 Eiswuerfel ohne Garnierung: Wasser, Saft/Schorle, Almdudler, Mate. Mit Zitrone: Cola/Zero, Sprite, Bitter Lemon, Tonic. Mit Orange: Fanta, Mezzo Mix, Ginger Ale.",
"Limonaden: Grapefruit: 2cl Grapefruit Mix, 1cl Limettensaft, Soda, 3 Eiswuerfel, Scheibe Limette. Limette-Minz: 2cl Minz Mix, 1cl Limettensaft, Soda, 3 Eiswuerfel, Scheibe Limette, Strauch Minze.",
"Weine: Weisswein (Weissweinglas): Gut Edel, Tagtraum, Chardonnay, Blanc De Noir, Rosalinde. Sekt (Sektglas): Muenstersekt, Cremant. Rotwein (Rotweinglas): Cabernet Syrah, Tre Passo. Immer etwas mehr als Fuellstrich einschenken!",
"Aperol Spritz: Aperol Kelchglas, 4cl Aperol, 10cl Secco, 4 Eiswuerfel, Soda, Scheibe Orange.",
"Lillet Wild Berry: Lillet Kelchglas, 5cl Lillet Blanc, 10cl Wild Berry, Beeren Mix, Eiswuerfel auffuellen.",
"Sarti Spritz: Sarti Kelchglas, 4cl Sarti, 10cl Secco, Eiswuerfel, Soda, Scheibe Limette.",
"Limoncello Spritz: Weissweinglas 0,2, 4cl Limoncello, 10cl Secco, Eiswuerfel, Soda, Scheibe Zitrone, Strauch Minze.",
"Spritzer: Weissweinglas 0,2, Weinschorle, Scheibe Zitrone, 3 Eiswuerfel.",
"Crodino: Weissweinglas 0,2, Crodino, 3 Eiswuerfel, Scheibe Orange.",
"Golden Ferrari: AFG Glas, 20cl Secco, 10cl Mate, 3 Eiswuerfel.",
"Secco Maracuja: AFG Glas, 20cl Secco, 10cl Maracuja, 3 Eiswuerfel.",
"Espresso Martini: Shaker, 4-5 Eiswuerfel, 3cl Vodka, 3cl Kahlua, 3cl Espresso, 15-20s schuetteln, Martini Glas durch Sieb, 3 Bohnen garnieren. Mix-Sollbestand Fr/Sa: 3,5 Flaschen.",
"Longdrinks (alle Nachtmann Glas Gross): Gin Tonic: 4cl Gin (Monkey47/Malfi/Beefeater), 4-5 Eiswuerfel, Scheibe Zitrone, Thomas Henry Tonic dazu. Vodka Soda: 4-5 Eis, 4cl Vodka, 1cl Limetten-/Zitronensaft, Soda, Scheibe Zitrone/Limette. Vodka Lemon: 4-5 Eis, 4cl Vodka, Scheibe Zitrone, Thomas Henry Lemon dazu. Vodka Mate: 4-5 Eis, 4cl Vodka, Mate auffuellen. Cuba Libre: 1/4 Limette stampfen, 4-5 Eis, 4cl Havanna Club 3, Scheibe Limette, Cola. Santo Libre: 4-5 Eis, 4cl Havanna Club 7, Scheibe Zitrone, Sprite dazu.",
"Schnaps im Shotglas: Berliner Luft, Frangelico, Jaegermeister, Tequila, Vodka, Sambuca. Im Flat White Glas (3 Eiswuerfel): Limoncello, Ramazotti, Havana Club, Ballantines, Sasse Lagerkorn, Pistazienlikor. Limoncello+Ramazotti mit Scheibe Zitrone.",
"",
"=== LIEFERUNGEN ===",
"Mo: Abholung Krimphove. Di: Lieferung Getraenke Richard + Handelshof, Abholung Krimphove. Mi: Abholung Krimphove + Marktware (bis 13h) + Fischbrathalle (ab 11h) + Feinkost Nassim. Do: Lieferung Bannert und Scherer (Wein), Abholung Krimphove. Fr: Lieferung Getraenke Richard, Abholung Krimphove. Sa: Lieferung Handelshof + Fischbrathalle + Feinkost Nassim, Abholung Krimphove + Marktware (bis 13h). So: Nichts (kein Brot).",
"",
"=== TECHNIK ===",
"Kaffeemaschine: morgens an, abends Siebtraeger reinigen+einhaengen. Muehle: 17,5g/30s. Spuelmaschine: Filter vor Anstellen reinigen, abends abpumpen+reinigen. Mocca-Master: abends reinigen. Eierkocher: morgens 6x (Sa/So 12x), abends reinigen. Suppenkocher: morgens befuellen, abends reinigen. EC-Geraete: abends laden, UG Reset Fr+Sa. Handhelds: abends laden. Sound EG: Soundcraft+Sonos. Sound UG: Yamaha DM3+PA.",
"",
"=== PERSONAL ===",
"Werte: Leidenschaft, Zusammenarbeit, Innovation, Energie, Authentizitaet. Respekt unabhaengig von Position.",
"Arbeitszeit: 5 Min vor Schichtbeginn. Stempeln bei Beginn+Ende. Pausen absprechen. Dienstplan am 25., Verfuegbarkeiten bis 20. Min 2 Schichten/Woche, 1x WE. Schichttausch: selbst Ersatz+Bestaetigung. Krankheit: sofort per Nachricht.",
"Kleidung: Feste Schuhe, keine Flip-Flops/Birkenstocks, keine politischen Shirts.",
"Trinkgeld: gleichmaessig auf alle Anwesenden. Lohn am 15. Folgemonat.",
"Personalrabatt: 50% Speisen (Arbeitstage), 50% Getraenke (immer), 1 Feierabendgetraenk gratis. Alles buchen!",
"Regeln: Keine Drogen. Kein Alkohol bei Arbeit (SL-Ausnahme ab 23h moeglich). Nicht ueber Gaeste laestern. Freigetraenke mit SL absprechen. Bei Uebergriffen sofort melden. Wohnungslose/Postboten/Lieferanten: immer Getraenk anbieten, auf Einladung buchen.",
"",
"=== SERVICE-REGELN ===",
"Glaeser bei Neuservierung austauschen (voll gegen leer). Getraenke erst abraeumen wenn Gaeste weg. KEIN Abraeumen leerer Glaeser solange Gast noch sitzt.",
"",
"=== REINIGUNG ===",
"Taeglich: Toiletten, Spuelmaschinenfilter, Terrasse, Gastraum, Theke+Servicepass. Mo: Blumen giessen, Pflanzenpflege, Kuehlschubladen Theke, Staubwischen Rueckbuffet+Galerie, Urinalsiebe. Fr: Spielekiste, Staubwischen. Waesche: Mo/Do/Sa 60 Grad.",
"",
"=== TERRASSE ===",
"Morgens: Grundreinigung, aufbauen (Blumen, Karten, Felle, Kissen). Abends: zu um 22h, Tische abraeumen, Stuehle aufstuhlen+abschliessen, Kundenstopper+Aschenbecher rein, Markise ein.",
"",
"=== KASSE ===",
"Schichtleitung taeglich: Kasse auszaehlen, Tagesumsatz separieren, Tagesbericht ziehen, Trinkgeld berechnen+sortieren+verteilen, Umsatz im Umschlag in Tresor, MA ausstempeln, Kasse+Handhelds aus+laden, EC aus+laden, EC UG Reset Fr+Sa."
].join("\n");

var SYS_PROMPT = "Du bist der Freundschaft Betriebsassistent. Antworte freundlich-professionell in du-Form, kurz und praktisch. Gib NIEMALS an woher die Info kommt. Keine Quellenverweise. Antworte nur wenn die Info klar vorliegt. Bei Unsicherheit sage: Das kann ich dir leider nicht beantworten. Bitte wende dich an die Betriebsleitung. und setze am Ende [NICHT_GEFUNDEN]. GESPERRT (verweigern ohne [NICHT_GEFUNDEN]): Gehaelter, Finanzzahlen, Strategiedokumente, Monatsstunden einzelner MA, Dienstplan, Bewerberdaten. Antworte auf Deutsch.\n\nWISSEN:\n" + KB_DATA;

var ST = {v:"setup", n:"", ms:[], ld:false, oq:[]};
try{var x=localStorage.getItem("fbot_oq");if(x)ST.oq=JSON.parse(x)}catch(e){}

function gk(){try{return localStorage.getItem("fbot_key")||""}catch(e){return ""}}
function sk(k){try{localStorage.setItem("fbot_key",k)}catch(e){}}
function soq(){try{localStorage.setItem("fbot_oq",JSON.stringify(ST.oq))}catch(e){}}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>")}

function init(){
  if(gk()){ST.v="login"}else{ST.v="setup"}
  render();
}

function render(){
  var a=document.getElementById("app");
  if(ST.v==="setup")return rSetup(a);
  if(ST.v==="admin")return rAdmin(a);
  if(ST.v==="login")return rLogin(a);
  rChat(a);
}

function rSetup(el){
  el.innerHTML='<div class="screen"><div class="box"><div style="font-size:40px;margin-bottom:8px">&#9881;</div><h1>Einrichtung</h1><p>Anthropic API-Key eingeben.<br>Wird nur lokal auf diesem Geraet gespeichert.</p><div id="serr"></div><input type="password" placeholder="sk-ant-..." id="keyIn"><button id="keyBtn">Speichern und starten</button><div class="hint">Den Key findest du unter console.anthropic.com<br>Er wird nicht weitergegeben.</div></div></div>';
  var ki=document.getElementById("keyIn"),kb=document.getElementById("keyBtn");
  ki.addEventListener("keydown",function(e){if(e.key==="Enter")doKey()});
  kb.addEventListener("click",doKey);
  function doKey(){
    var v=ki.value.trim();
    if(!v||v.length<10){document.getElementById("serr").innerHTML='<div class="err">Bitte einen gueltigen API-Key eingeben</div>';return}
    sk(v);ST.v="login";render();
  }
  setTimeout(function(){ki.focus()},100);
}

function rLogin(el){
  el.innerHTML='<div class="screen"><div class="box"><div style="font-size:48px;margin-bottom:8px">&#129505;</div><h1>Freundschaft</h1><p>Betriebsassistent<br>Stelle deine Fragen zu Ablaeufen, Rezepten und Prozessen.</p><input type="text" placeholder="Dein Name" id="nameIn"><button id="goBtn" disabled>Los gehts</button><div class="link" id="cfgLnk">Einstellungen</div></div></div>';
  var ni=document.getElementById("nameIn"),gb=document.getElementById("goBtn");
  ni.addEventListener("input",function(){gb.disabled=!ni.value.trim()});
  ni.addEventListener("keydown",function(e){if(e.key==="Enter"&&ni.value.trim()){ST.n=ni.value.trim();ST.v="chat";render()}});
  gb.addEventListener("click",function(){if(ni.value.trim()){ST.n=ni.value.trim();ST.v="chat";render()}});
  document.getElementById("cfgLnk").addEventListener("click",function(){sk("");ST.v="setup";render()});
  setTimeout(function(){ni.focus()},100);
}

function rChat(el){
  var mh="";
  if(!ST.ms.length)mh='<div class="empty"><div style="font-size:36px;margin-bottom:10px">&#128172;</div>Stelle eine Frage<br>z.B. Wie mache ich einen Aperol Spritz?</div>';
  for(var i=0;i<ST.ms.length;i++){
    var m=ST.ms[i],c=m.r==="u"?"msg msg-u":"msg msg-a",b=m.r==="u"?"bub bub-u":"bub bub-a",ex="";
    if(m.nf)ex='<div class="nf">&#128221; Frage an Betriebsleitung weitergeleitet.</div>';
    mh+='<div class="'+c+'"><div class="'+b+'">'+esc(m.t)+ex+'</div></div>';
  }
  if(ST.ld)mh+='<div class="msg msg-a"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
  mh+='<div id="end"></div>';
  el.innerHTML='<div class="wrap"><div class="hdr"><div class="hdr-l"><span style="font-size:26px">&#129505;</span><div><div class="hdr-t">Freundschaft</div><div class="hdr-s">Hallo '+esc(ST.n)+'</div></div></div><button class="abtn" id="aBtn">&#128203; '+ST.oq.length+'</button></div><div class="msgs" id="mBox">'+mh+'</div><div class="ibar"><input type="text" placeholder="Stelle deine Frage..." id="qIn"><button id="sBtn">Fragen</button></div></div>';
  document.getElementById("aBtn").addEventListener("click",function(){ST.v="admin";render()});
  var qi=document.getElementById("qIn"),sb=document.getElementById("sBtn");
  qi.addEventListener("keydown",function(e){if(e.key==="Enter")doQ()});
  sb.addEventListener("click",doQ);
  if(ST.ld){sb.disabled=true;qi.disabled=true}
  document.getElementById("end").scrollIntoView({behavior:"smooth"});
  if(!ST.ld)setTimeout(function(){qi.focus()},100);
}

async function doQ(){
  var qi=document.getElementById("qIn"),q=qi.value.trim();
  if(!q||ST.ld)return;
  ST.ms.push({r:"u",t:q});
  ST.ld=true;
  render();
  try{
    var key=gk();
    if(!key){ST.ms.push({r:"a",t:"Kein API-Key hinterlegt. Bitte unter Einstellungen den Key eingeben."});ST.ld=false;render();return}
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:SYS_PROMPT,
        messages:ST.ms.filter(function(m){return m.r==="u"||(m.r==="a"&&!m.nf)}).slice(-8).map(function(m){return{role:m.r==="u"?"user":"assistant",content:m.t}})
      })
    });
    var d=await res.json();
    if(d.error){
      ST.ms.push({r:"a",t:"API-Fehler: "+(d.error.message||"Unbekannt")});
    }else{
      var ans=(d.content&&d.content[0]&&d.content[0].text)||"Fehler. Bitte frag die Betriebsleitung.";
      var nf=ans.indexOf("[NICHT_GEFUNDEN]")!==-1;
      ans=ans.replace("[NICHT_GEFUNDEN]","").replace(/\[NICHT_GEFUNDEN\]/g,"").trim();
      ST.ms.push({r:"a",t:ans,nf:nf});
      if(nf){ST.oq.push({q:q,by:ST.n,d:new Date().toISOString()});soq()}
    }
  }catch(e){
    ST.ms.push({r:"a",t:"Verbindungsfehler: "+e.message+". Bitte Internetverbindung pruefen."});
  }
  ST.ld=false;
  render();
}

function rAdmin(el){
  var c="";
  if(!ST.oq.length)c='<p style="color:#6B7280;text-align:center;margin-top:30px">Keine offenen Fragen.</p>';
  else for(var i=0;i<ST.oq.length;i++){
    var q=ST.oq[i],d=new Date(q.d);
    c+='<div class="qcard"><strong>'+esc(q.q)+'</strong><div class="meta">Von: '+esc(q.by)+' - '+d.toLocaleDateString("de-DE")+'</div><button data-i="'+i+'">Erledigt</button></div>';
  }
  el.innerHTML='<div class="admin"><div class="admin-w"><div class="admin-h"><h1>Offene Fragen ('+ST.oq.length+')</h1><button id="bkBtn">Zurueck</button></div>'+c+'</div></div>';
  document.getElementById("bkBtn").addEventListener("click",function(){ST.v="chat";render()});
  var bs=el.querySelectorAll(".qcard button");
  for(var j=0;j<bs.length;j++)bs[j].addEventListener("click",function(){ST.oq.splice(parseInt(this.dataset.i),1);soq();render()});
}

init();
</script>
</body>
</html>
